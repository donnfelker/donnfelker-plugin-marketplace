name: Lint PR Title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

            Format: type(scope): [ticket] description
            Example: feat(auth): tos-123 add login support

            Tip: Use the /git-commit skill to auto-format your commit message.
